<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursive Neural Network - Task Solver</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">RNN</div>
                <span>RecursiveNet</span>
            </div>
            
            <nav class="nav-tabs">
                <button class="nav-tab active" data-task="maze">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M3 9h18M9 3v18"/>
                    </svg>
                    Maze
                </button>
                <button class="nav-tab" data-task="puzzle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                    </svg>
                    8-Puzzle
                </button>
                <button class="nav-tab" data-task="arc">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M12 3v18M3 12h18"/>
                    </svg>
                    ARC-AGI
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="model-status">
                    <div class="status-dot"></div>
                    <span>Model Loaded</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <header class="header">
                <div class="header-title">
                    <h1 id="taskTitle">Maze Solver</h1>
                    <p id="taskDescription">Navigate from start to goal using the trained agent</p>
                </div>
                <div class="header-actions">
                    <div class="speed-control">
                        <label>Speed</label>
                        <input type="range" id="speedSlider" min="10" max="300" value="80">
                        <span id="speedValue">80ms</span>
                    </div>
                </div>
            </header>

            <div class="content">
                <div class="canvas-section">
                    <div class="canvas-wrapper">
                        <canvas id="taskCanvas" width="440" height="440"></canvas>
                        <div class="canvas-overlay" id="canvasOverlay">
                            <div class="overlay-content">
                                <div class="overlay-icon">
                                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                                        <path d="M3 9h18M9 3v18"/>
                                    </svg>
                                </div>
                                <p>Click <strong>Generate</strong> to create a new task</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="generateBtn" class="btn btn-primary">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                            </svg>
                            Generate
                        </button>
                        <button id="solveBtn" class="btn btn-success" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            Solve
                        </button>
                        <button id="resetBtn" class="btn btn-ghost">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                                <path d="M3 3v5h5"/>
                            </svg>
                            Reset
                        </button>
                    </div>
                </div>

                <div class="info-section">
                    <div class="card status-card">
                        <div class="card-header">
                            <h3>Status</h3>
                        </div>
                        <div class="card-body">
                            <div id="statusText" class="status-badge ready">Ready</div>
                        </div>
                    </div>

                    <div class="card stats-card">
                        <div class="card-header">
                            <h3>Statistics</h3>
                        </div>
                        <div class="card-body">
                            <div class="stat-item">
                                <span class="stat-label">Grid Size</span>
                                <span class="stat-value" id="gridSize">10 × 10</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Optimal</span>
                                <span class="stat-value" id="optimalSteps">—</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Agent Steps</span>
                                <span class="stat-value" id="agentSteps">—</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Result</span>
                                <span class="stat-value" id="resultStatus">—</span>
                            </div>
                        </div>
                    </div>

                    <div class="card legend-card" id="legendCard">
                        <div class="card-header">
                            <h3>Legend</h3>
                        </div>
                        <div class="card-body legend-body">
                            <div class="legend-item"><span class="legend-dot wall"></span>Wall</div>
                            <div class="legend-item"><span class="legend-dot path"></span>Path</div>
                            <div class="legend-item"><span class="legend-dot start"></span>Start</div>
                            <div class="legend-item"><span class="legend-dot goal"></span>Goal</div>
                            <div class="legend-item"><span class="legend-dot agent"></span>Agent</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
