<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Solver - Recursive Neural Network</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧩 Maze Solver</h1>
            <p class="subtitle">Recursive Neural Network Agent</p>
        </header>

        <div class="controls">
            <button id="generateBtn" class="btn btn-primary">
                <span class="icon">🎲</span> Generate Maze
            </button>
            <button id="solveBtn" class="btn btn-success" disabled>
                <span class="icon">🤖</span> Solve with AI
            </button>
            <button id="solveBfsBtn" class="btn btn-secondary" disabled>
                <span class="icon">📐</span> Solve with BFS
            </button>
            <button id="resetBtn" class="btn btn-outline">
                <span class="icon">🔄</span> Reset
            </button>
        </div>

        <div class="main-content">
            <div class="maze-container">
                <canvas id="mazeCanvas" width="420" height="420"></canvas>
                <div class="maze-overlay" id="mazeOverlay">
                    <span>Click "Generate Maze" to start</span>
                </div>
            </div>

            <div class="info-panel">
                <div class="status-card">
                    <h3>Status</h3>
                    <div id="statusText" class="status-text">Ready</div>
                </div>
                
                <div class="stats-card">
                    <h3>Statistics</h3>
                    <div class="stat-row">
                        <span class="stat-label">Maze Size:</span>
                        <span class="stat-value" id="mazeSize">10 × 10</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Optimal Path:</span>
                        <span class="stat-value" id="optimalSteps">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Agent Steps:</span>
                        <span class="stat-value" id="agentSteps">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Result:</span>
                        <span class="stat-value" id="resultStatus">-</span>
                    </div>
                </div>

                <div class="legend-card">
                    <h3>Legend</h3>
                    <div class="legend-item">
                        <div class="legend-color wall"></div>
                        <span>Wall</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color path"></div>
                        <span>Path</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color start"></div>
                        <span>Start</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color goal"></div>
                        <span>Goal</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color agent"></div>
                        <span>Agent Path</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="speed-control">
            <label for="speedSlider">Animation Speed:</label>
            <input type="range" id="speedSlider" min="10" max="500" value="100">
            <span id="speedValue">100ms</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
