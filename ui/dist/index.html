<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRM · Arena — Transformer Reasoning Model</title>
  <meta name="description" content="TRM Arena: watch a Transformer Reasoning Model solve Maze, Puzzle, Sudoku and ARC tasks in real time.">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="arena">

  <!-- ── HEADER ─────────────────────────────────────────────────── -->
  <header class="arena-header">
    <div class="logo-group">
      <div class="logo-dot" id="logoDot"></div>
      <div>
        <div class="logo-title">TRM · ARENA</div>
        <div class="logo-sub">Transformer Reasoning Model</div>
      </div>
    </div>

    <nav class="task-tabs" id="taskTabs">
      <button class="tab active" data-task="maze">Maze</button>
      <button class="tab" data-task="puzzle">8-Puzzle</button>
      <button class="tab" data-task="sudoku">Sudoku</button>
      <button class="tab" data-task="arc">ARC</button>
    </nav>

    <div class="status-pill">
      <span class="pill-dot" id="pillDot"></span>
      <span class="pill-text" id="pillText">ready</span>
    </div>
  </header>

  <!-- ── BODY ───────────────────────────────────────────────────── -->
  <div class="arena-body">

    <!-- LEFT PANEL -->
    <div class="panel panel-left">
      <div class="panel-header">
        <span class="panel-label">PUZZLE INPUT</span>
        <span class="task-badge" id="taskBadge">MAZE · 21×21</span>
      </div>

      <div class="board-area" id="boardArea">
        <div class="board-placeholder" id="boardPlaceholder">
          press <strong>▶ Solve</strong> to begin
        </div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-val" id="statSteps">0</span>
          <span class="stat-lbl">STEPS</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="statNodes">0</span>
          <span class="stat-lbl">NODES</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="statTime">0.0s</span>
          <span class="stat-lbl">TIME</span>
        </div>
      </div>

      <div class="controls-row">
        <button class="btn-solve" id="solveBtn">&#9654;&nbsp; Solve</button>
        <button class="btn-sec"  id="resetBtn">Reset</button>
        <button class="btn-sec"  id="shuffleBtn">Shuffle</button>
        <div class="speed-wrap">
          <span class="speed-lbl">speed</span>
          <input type="range" id="speedSlider" min="1" max="5" value="3" class="speed-slider">
        </div>
      </div>

      <div class="scrubber-row">
        <span class="scrubber-lbl">history</span>
        <input type="range" id="scrubber" min="0" max="0" value="0" class="scrubber-slider">
        <span class="scrubber-count" id="scrubberCount">0 / 0</span>
      </div>

      <div class="solved-banner" id="solvedBanner">
        &#10003; solved &mdash; optimal path found
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="panel-divider"></div>

    <!-- RIGHT PANEL -->
    <div class="panel panel-right">
      <div class="panel-header">
        <span class="panel-label">REASONING TRACE</span>
        <span class="trm-badge" id="trmBadge">TRM · IDLE</span>
      </div>
      <div class="trace-progress-wrap">
        <div class="trace-progress-bar" id="traceProgressBar"></div>
      </div>
      <div class="trace-log" id="traceLog">
        <div class="trace-empty">// awaiting task input&hellip;</div>
      </div>
    </div>

  </div><!-- /arena-body -->
</div><!-- /arena -->

<script src="app.js"></script>
</body>
</html>
